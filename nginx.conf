server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static, server-rendered privacy policy so non-JS crawlers (e.g. Google
    # Play's privacy-policy checker) see the real text instead of the empty SPA
    # shell. Generated at build time by scripts/prerender-legal.mjs.
    # Must come before `location /` so it isn't swallowed by the SPA fallback.
    location = /privacy {
        try_files /privacy.html =404;
    }
    location = /privacy/ {
        return 301 /privacy;
    }

    # Static, server-rendered support page — the App Store / Google Play
    # "Support URL". A real web page with contact info + FAQ (a Telegram
    # deep-link is rejected). Generated by scripts/prerender-legal.mjs.
    location = /support {
        try_files /support.html =404;
    }
    location = /support/ {
        return 301 /support;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
